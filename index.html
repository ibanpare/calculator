<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="./styles.css">
    <script src="./script.js"></script>
    <title>Document</title>
</head>
<body>
    <div id="header">
        <h1>Calculator</h1>
    </div>
    <div id="container">
        <div id="calculator">
            <div id="display"></div>
            <div class="buttons">
                <div id="button 7">
                    <p>7</p>
                </div>
                <div id="button 8"
                    ><p>8</p>
                </div>
                <div id="button 9">
                    <p>9</p>
                </div>
                <div id="button plus">
                    <p>+</p>
                </div>
                <div id="button 4">
                    <p>4</p>
                </div>
                <div id="button 5">
                    <p>5</p>
                </div>
                <div id="button 6">
                    <p>6</p>
                </div>
                <div id="button minus">
                    <p>-</p>
                </div>
                <div id="button 1">
                    <p>1</p>
                </div>
                <div id="button 2">
                    <p>2</p>
                </div>
                <div id="button 3"><p>
                    3
                </p></div>
                <div id="button X">
                    <p>X</p>
                </div>
                <div id="clear">
                    <p>CLEAR</p>
                </div>
                <div id="button 0">
                    <p>0</p>
                </div>
                <div id="button =">
                    <p>=</p>
                </div>
                <div id="button /">
                    <p>/</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
