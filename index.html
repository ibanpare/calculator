<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="./styles.css">
    <script src="./script.js" defer></script>
    <title>Document</title>
</head>
<body>
    <div id="header">
        <h1>Calculator</h1>
    </div>
    <div id="container">
        <div id="calculator">
            <div id="display"></div>
            <div class="buttons">
                <div id="seven">
                    <p>7</p>
                </div>
                <div id="eight">
                    <p>8</p>
                </div>
                <div id="nine">
                    <p>9</p>
                </div>
                <div id="add">
                    <p>+</p>
                </div>
                <div id="four">
                    <p>4</p>
                </div>
                <div id="five">
                    <p>5</p>
                </div>
                <div id="six">
                    <p>6</p>
                </div>
                <div id="minus">
                    <p>-</p>
                </div>
                <div id="one">
                    <p>1</p>
                </div>
                <div id="two">
                    <p>2</p>
                </div>
                <div id="three"><p>
                    3
                </p></div>
                <div id="multiply">
                    <p>X</p>
                </div>
                <div id="clear">
                    <p>CLEAR</p>
                </div>
                <div id="zero">
                    <p>0</p>
                </div>
                <div id="equals">
                    <p>=</p>
                </div>
                <div id="divide">
                    <p>/</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
